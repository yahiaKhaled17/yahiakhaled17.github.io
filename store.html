<!DOCTYPE html>
<html>
<head>
  <title>Mobile Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      text-align: center;
    }

    h1 {
      margin: 30px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      width: 230px;
      margin: 15px;
      padding: 15px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: #0071e3;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
    }

  </style>
</head>

<body>

<h1>iPhone Store 📱</h1>

<div class="products">

<!-- iPhone 13 -->
<div class="card">
  <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-13-01.jpg">
  <h3>iPhone 13</h3>
  <p class="price">25,000 EGP</p>
  <a href="iphone13.html"><button class="btn">View</button></a>
</div>

<!-- iPhone 14 -->
<div class="card">
  <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-14-01.jpg">
  <h3>iPhone 14</h3>
  <p class="price">30,000 EGP</p>
  <a href="iphone14.html"><button class="btn">View</button></a>
</div>

<!-- iPhone 15 -->
<div class="card">
  <img src="https://fdn2.gsmarena.com/vv/pics/apple/apple-iphone-15-01.jpg">
  <h3>iPhone 15</h3>
  <p class="price">35,000 EGP</p>
  <a href="iphone15.html"><button class="btn">View</button></a>
</div>

<!-- iPhone 16 -->
<div class="card">
  <img src="https://via.placeholder.com/250">
  <h3>iPhone 16</h3>
  <p class="price">40,000 EGP</p>
  <a href="iphone16.html"><button class="btn">View</button></a>
</div>

<!-- iPhone 17 Pro Max -->
<div class="card">
  <img src="https://via.placeholder.com/250">
  <h3>iPhone 17 Pro Max</h3>
  <p class="price">50,000 EGP</p>
  <a href="iphone17.html"><button class="btn">View</button></a>
</div>

</div>

</body>
</html>

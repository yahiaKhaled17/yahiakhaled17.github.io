<!DOCTYPE html>
<html>
<head>
  <title>Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #f5f5f7;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin: 20px;
    }

    .product {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 15px;
    }

    .btn {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>Mobile Store 📱</h1>

<div class="product">
  <h2>iPhone 13</h2>
  <p>Price: 25,000 EGP</p>
  <button class="btn">Buy</button>
</div>

<div class="product">
  <h2>Samsung S22</h2>
  <p>Price: 20,000 EGP</p>
  <button class="btn">Buy</button>
</div>

<div class="product">
  <h2>Xiaomi 13</h2>
  <p>Price: 15,000 EGP</p>
  <button class="btn">Buy</button>
</div>

</body>
</html>

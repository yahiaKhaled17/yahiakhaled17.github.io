<!DOCTYPE html>
<html>
<head>
  <title>Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f7;
      text-align: center;
    }

    h1 {
      margin: 40px 0;
      font-size: 40px;
    }

    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      width: 250px;
      margin: 15px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .card h2 {
      margin: 10px 0;
    }

    .price {
      color: #0071e3;
      font-weight: bold;
    }

    .btn {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 15px;
      background: black;
      color: white;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h1>Mobile Store 📱</h1>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/250" />
    <h2>iPhone 13</h2>
    <p class="price">25,000 EGP</p>
    <button class="btn">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" />
    <h2>Samsung S22</h2>
    <p class="price">20,000 EGP</p>
    <button class="btn">Buy</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/250" />
    <h2>Xiaomi 13</h2>
    <p class="price">15,000 EGP</p>
    <button class="btn">Buy</button>
  </div>

</div>

</body>
</html>
